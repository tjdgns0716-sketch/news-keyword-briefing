name: Update and deploy briefing

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30,45 22 * * *"
    - cron: "0 23 * * *"
    - cron: "30,45 9 * * *"
    - cron: "0 10 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync latest branch
        if: github.event_name != 'push'
        run: git pull --rebase origin main

      - name: Decide whether to generate briefing
        id: update-check
        run: |
          node -e "const fs=require('fs'); const event=process.env.GITHUB_EVENT_NAME; let should=event==='workflow_dispatch'; if(event==='schedule'){ try { const data=JSON.parse(fs.readFileSync('data/latest.json','utf8')); const ageHours=(Date.now()-new Date(data.generatedAt).getTime())/36e5; should=ageHours>=6; console.log('Latest briefing age:', ageHours.toFixed(2), 'hours'); } catch { should=true; } } console.log('Should generate:', should); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'should_generate=' + String(should) + '\n');"

      - name: Generate briefing data
        if: steps.update-check.outputs.should_generate == 'true'
        run: node scripts/generate-briefing.mjs
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEWS_RANGE_DAYS: 3
          CURRENT_WINDOW_HOURS: 24
          BASELINE_YEARS: 3
          MAX_ARTICLES_PER_CATEGORY: 140
          MAX_BASELINE_ARTICLES_PER_CATEGORY: 140
          MAX_ARTICLES_PER_QUERY: 15
          MAX_LIST_PAGES_PER_DAY: 10
          COLLECTION_MODE: section

      - name: Commit updated data
        if: steps.update-check.outputs.should_generate == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/latest.js
          if git diff --cached --quiet; then
            echo "No briefing data changes to commit."
          else
            git commit -m "Update briefing data"
            git pull --rebase origin main
            git push
          fi

      - name: Prepare static site
        run: |
          rm -rf dist
          mkdir -p dist/data
          cp index.html app.js styles.css dist/
          cp data/latest.json data/latest.js dist/data/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
